{% load static %}

{% block content %}
<!DOCTYPE html>
<html lang="en" dir="ltr">

<body>

  <rect x="698" y="25" width="36" height="95"/>
  <rect x="739" y="45" width="22" height="75"/>
  <rect x="766" y="30" width="34" height="90"/>
  <rect x="805" y="50" width="20" height="70"/>
  <rect x="830" y="18" width="40" height="102"/>
  <rect x="838" y="8"  width="10" height="12"/>
  <rect x="875" y="42" width="26" height="78"/>
  <rect x="906" y="55" width="18" height="65"/>

  <rect x="1143" y="42" width="24" height="78"/>
  <rect x="1172" y="55" width="28" height="65"/>
</svg>

<div class="auth-wrapper">

  <!-- Logo -->
  <div class="auth-logo">
    <span class="logo-icon">🏙️</span>

    <div class="logo-title">
      SMART CITY
    </div>

    <div class="logo-sub">
      Urban Management System
    </div>
  </div>

  <!-- Auth Card -->
  <div class="auth-card">

    <!-- Tabs -->
    <div class="auth-tabs">

      <button class="tab-btn active"
              id="tab-login"
              onclick="switchTab('login')">

        🔑 Sign In
      </button>

      <button class="tab-btn"
              id="tab-register"
              onclick="switchTab('register')">

        🏙️ Register
      </button>

    </div>
    <div class="auth-page active" id="page-login">

      <div class="auth-heading">
        Welcome back 👋
      </div>

      <div class="auth-subheading">
        Sign in to access city services
      </div>
      <div class="alert error" id="login-error">

        <span>⚠️</span>

        <span id="login-error-msg">
          Invalid credentials
        </span>

      </div>
      <div class="alert success" id="login-success">

        <span>✅</span>

        <span>
          Login successful! Redirecting...
        </span>

      </div>
      <div class="form-group">

        <label class="form-label">
          Email Address
        </label>

        <div class="input-wrap">

          <span class="input-icon">✉️</span>

          <input
            class="form-input"
            type="email"
            id="login-email"
            placeholder="your@email.com"
            autocomplete="email"
          >

        </div>
      </div>

      <div class="form-group">

        <label class="form-label">

          Password

          <a class="forgot-link"
             onclick="showForgot()">

            Forgot password?
          </a>

        </label>

        <div class="input-wrap">

          <span class="input-icon">🔒</span>

          <input
            class="form-input"
            type="password"
            id="login-password"
            placeholder="Enter your password"
            autocomplete="current-password"
          >

          <button
            class="eye-btn"
            onclick="togglePwd('login-password', this)"
            type="button">

            👁️
          </button>

        </div>
      </div>

      <button class="submit-btn"
              id="login-btn"
              onclick="handleLogin()">

        Sign In
      </button>

      <div class="switch-text">

        Don't have an account?

        <a onclick="switchTab('register')">
          Register now
        </a>

      </div>

    </div>

  </div>

</div>

{% endblock %}
