
<script>
const titles = {
  dashboard: 'Main Dashboard',
  ai: 'AI Assistant',
  complaints: 'City Complaints',
  taxi: 'Online Taxi',
  market: 'City Market',
  payment: 'Bill Payments',
  social: 'Social Network',
  map: 'City Map',
  news: 'City News'
};

function filterComplaints(btn, status) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleLike(btn) {
  btn.classList.toggle('liked');
}

function addCart(btn) {
  btn.textContent = '✓ Added';
  btn.style.background = 'rgba(0,200,83,0.15)';
  btn.style.color = '#00C853';
  btn.style.borderColor = 'rgba(0,200,83,0.3)';
  setTimeout(() => {
    btn.textContent = '+ Cart';
    btn.style.background = '';
    btn.style.color = '';
    btn.style.borderColor = '';
  }, 2000);
}

function requestTaxi() {
  const dest = document.getElementById('taxi-dest').value;
  if (!dest) { alert('Please enter a destination'); return; }
  alert('✅ Your request has been submitted! Driver is on the way...');
}

// AI Chat
const responses = {
  'hospital': '🏥 Nearest hospitals to you:\n\n1. Wazir Akbar Khan Hospital — 1.2km\n2. Sehat Hospital — 2.0km\n3. National Hospital — 3.5km\n\nVisit the Map section for directions.',
  'traffic': '🚦 Today\'s traffic conditions:\n\n🔴 Chowk Deh Bori — Heavy\n🟡 Darulaman Road — Moderate\n🟢 Bagrami — Clear\n\nTry using side streets to save time.',
  'complaint': '📋 To file a complaint:\n1. Go to the "Complaints" section\n2. Click "File New Complaint"\n3. Select the issue type\n4. Add a description and photo\n\nYour complaint will be reviewed within 24 hours.',
  'gas': '⛽ Nearest gas stations:\n\n1. Mehwar Gas Station — 0.5km\n2. Afghan Fuel — 1.8km\n3. Deh Bori Station — 2.3km',
  'water': '💧 For water issues, file a complaint or contact the Water & Sewage Authority.\n📞 Emergency: 120',
  'power': '⚡ For power outages:\n📞 Contact DABS: 110\nOr file a complaint through this system.',
};

function getAIResponse(msg) {
  const lower = msg.toLowerCase();
  for (const key in responses) {
    if (lower.includes(key)) return responses[key];
  }
  return `I understood your query: "${msg}"\n\nI can help with city services, nearby locations, traffic, complaints, and other urban topics. Please try to be more specific with your question.`;
}

function addMessage(text, type) {
  const container = document.getElementById('chat-messages');
  const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = `<div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div><div class="msg-time">${now}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  addMessage(msg, 'user');
  input.value = '';
  setTimeout(() => {
    addMessage(getAIResponse(msg), 'ai');
  }, 600);
}

function sendSuggestion(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// Category button toggle for map
document.querySelectorAll('.category-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
</body>
</html>
