{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">
        Notifications
    </h2>

    {% for n in request.user.notifications.all %}

    <div class="card mb-3 shadow-sm">

        <div class="card-body">

            <h5>{{ n.title }}</h5>

            <p>{{ n.message }}</p>

            <small class="text-muted">
                {{ n.created_at }}
            </small>

        </div>

    </div>

    {% empty %}

    <div class="alert alert-info">
        No notifications yet.
    </div>

    {% endfor %}

</div>

{% endblock %}
