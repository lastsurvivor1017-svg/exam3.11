
  <!-- ====== PAYMENT PAGE ====== -->
  <div class="page" id="page-payment">
    <div class="page-header">
      <div>
        <div class="page-header-title">💳 Bill Payments</div>
        <div class="page-header-sub">Pay city services online</div>
      </div>
    </div>

    <div class="payment-layout">
      <div class="card">
        <div class="card-title">📄 Pending Bills</div>
        <div class="bill-item">
          <div class="bill-icon">💡</div>
          <div class="bill-details">
            <div class="bill-name">Electricity</div>
            <div class="bill-period">March 2024</div>
          </div>
          <span class="bill-status bill-unpaid">Unpaid</span>
          <div class="bill-amount">1,200 AFN</div>
          <button class="pay-btn">Pay</button>
        </div>
        <div class="bill-item">
          <div class="bill-icon">💧</div>
          <div class="bill-details">
            <div class="bill-name">Water</div>
            <div class="bill-period">March 2024</div>
          </div>
          <span class="bill-status bill-unpaid">Unpaid</span>
          <div class="bill-amount">800 AFN</div>
          <button class="pay-btn">Pay</button>
        </div>
        <div class="bill-item">
          <div class="bill-icon">🏛️</div>
          <div class="bill-details">
            <div class="bill-name">Property Tax</div>
            <div class="bill-period">Year 2024</div>
          </div>
          <span class="bill-status bill-unpaid">Unpaid</span>
          <div class="bill-amount">5,000 AFN</div>
          <button class="pay-btn">Pay</button>
        </div>
        <div class="bill-item">
          <div class="bill-icon">🗑️</div>
          <div class="bill-details">
            <div class="bill-name">Waste Collection</div>
            <div class="bill-period">February 2024</div>
          </div>
          <span class="bill-status bill-paid">✅ Paid</span>
          <div class="bill-amount">300 AFN</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">💳 Quick Payment</div>
        <div style="display:flex;flex-direction:column;gap:12px;margin-top:8px">
          <div class="form-group">
            <div class="form-label">Card Number</div>
            <input class="form-input" type="text" placeholder="**** **** **** ****">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="form-group">
              <div class="form-label">Expiry Date</div>
              <input class="form-input" type="text" placeholder="MM/YY">
            </div>
            <div class="form-group">
              <div class="form-label">CVV</div>
              <input class="form-input" type="text" placeholder="***">
            </div>
          </div>
          <div style="background:rgba(0,200,255,0.05);border:1px solid rgba(0,200,255,0.15);border-radius:10px;padding:14px">
            <div style="font-size:12px;color:var(--text3);margin-bottom:4px">Total Amount</div>
            <div style="font-size:22px;font-weight:700;color:var(--accent)">7,000 AFN</div>
          </div>
          <button class="request-btn">🔒 Secure Payment</button>
        </div>
      </div>
    </div>
  </div>
